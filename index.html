<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Conversion Studio — PBIX to Excel converter" />
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230c0e14'/%3E%3Cpath d='M17 17h30v30H17z' fill='none' stroke='%23d4ad45' stroke-width='4'/%3E%3Cpath d='M25 25l14 14m0-14L25 39' stroke='%23d4ad45' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E" />
  <title>Conversion Studio · PBIX → XLSX</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink: #0c0e14;
      --ink2: #13161f;
      --ink3: #1a1e2a;
      --ink4: #222736;
      --line: #2a3045;
      --line2: #333d55;
      --gold: #c9a84c;
      --gold2: #e8cc7a;
      --gold-dim: rgba(201, 168, 76, .12);
      --gold-mid: rgba(201, 168, 76, .22);
      --teal: #3ecfb2;
      --teal-dim: rgba(62, 207, 178, .10);
      --rose: #e05c6a;
      --rose-dim: rgba(224, 92, 106, .10);
      --fog: #8a93aa;
      --mist: #6b7491;
      --pale: #e4e8f4;
      --white: #f6f8ff;
      --mono: 'DM Mono', monospace;
      --serif: 'Fraunces', serif;
      --sans: 'DM Sans', sans-serif;
    }

    html,
    body,
    #root {
      min-height: 100%;
    }

    body {
      font-family: var(--sans);
      background: var(--ink);
      color: var(--pale);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .6;
    }

    button,
    input {
      font-family: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }

    .shell {
      display: grid;
      grid-template-columns: 360px 1fr;
      grid-template-rows: 58px minmax(0, 1fr);
      height: 100vh;
      min-height: 700px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      background: rgba(12, 14, 20, .96);
      border-bottom: 1px solid var(--line);
      position: relative;
      z-index: 10;
    }

    .topbar::after {
      content: '';
      position: absolute;
      inset: 0 0 -1px;
      background: linear-gradient(90deg, rgba(201, 168, 76, .06), transparent 60%);
      pointer-events: none;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 1px solid rgba(201, 168, 76, .35);
      background: linear-gradient(135deg, rgba(201, 168, 76, .18), rgba(201, 168, 76, .05));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-svg {
      width: 15px;
      height: 15px;
    }

    .topbar-brand {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .brand-name {
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .brand-tagline {
      font-family: var(--mono);
      font-size: 9.5px;
      color: var(--mist);
      letter-spacing: .04em;
    }

    .topbar-divider {
      width: 1px;
      height: 22px;
      background: var(--line);
      flex-shrink: 0;
    }

    .topbar-badge {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .08em;
      color: var(--gold);
      border: 1px solid rgba(201, 168, 76, .3);
      background: var(--gold-dim);
      padding: 4px 9px;
      border-radius: 4px;
    }

    .topbar-spacer {
      flex: 1;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 1px solid var(--line2);
      border-radius: 6px;
      background: var(--ink2);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--fog);
      letter-spacing: .02em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--line2);
      transition: background .3s, box-shadow .3s;
    }

    .status-dot.idle {
      background: #ffffff;
      box-shadow: 0 0 8px rgba(255, 255, 255, .55);
    }

    .status-dot.uploaded {
      background: #f5c542;
      box-shadow: 0 0 9px rgba(245, 197, 66, .75);
    }

    .status-dot.processing {
      background: #f28c28;
      box-shadow: 0 0 10px rgba(242, 140, 40, .82);
      animation: blink 1.1s ease-in-out infinite;
    }

    .status-dot.success {
      background: #32c875;
      box-shadow: 0 0 9px rgba(50, 200, 117, .72);
    }

    .status-pill.idle {
      color: #ffffff;
    }

    .status-pill.uploaded {
      color: #f5c542;
    }

    .status-pill.processing {
      color: #f28c28;
    }

    .status-pill.success {
      color: #32c875;
    }

    .left {
      background: var(--ink2);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .left-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 20px 16px 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--line2) transparent;
    }

    .card {
      background: var(--ink3);
      border: 1px solid var(--line);
      border-radius: 10px;
      transition: border-color .2s;
      flex-shrink: 0;
    }

    .card:hover {
      border-color: var(--line2);
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(26, 30, 42, .7);
      border-radius: 10px 10px 0 0;
    }

    .card-title {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--mist);
    }

    .badge-req {
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--rose);
      background: var(--rose-dim);
      border: 1px solid rgba(224, 92, 106, .2);
      border-radius: 3px;
      padding: 2px 6px;
    }

    .badge-opt {
      font-family: var(--mono);
      font-size: 8px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid rgba(201, 168, 76, .2);
      border-radius: 3px;
      padding: 2px 6px;
    }

    .card-body {
      padding: 14px;
    }

    .drop-zone {
      border: 1px dashed var(--line2);
      border-radius: 8px;
      padding: 22px 14px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      background: rgba(12, 14, 20, .5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-height: 130px;
      justify-content: center;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.over {
      border-color: var(--gold);
      background: var(--gold-dim);
    }

    .drop-zone.has {
      border-color: rgba(62, 207, 178, .4);
      background: var(--teal-dim);
    }

    .drop-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(201, 168, 76, .08);
      border: 1px solid rgba(201, 168, 76, .2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drop-zone.has .drop-icon {
      background: rgba(62, 207, 178, .08);
      border-color: rgba(62, 207, 178, .2);
    }

    .drop-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--pale);
      line-height: 1.4;
    }

    .drop-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--mist);
    }

    .drop-filename {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--teal);
      background: rgba(12, 14, 20, .7);
      border: 1px solid rgba(62, 207, 178, .2);
      border-radius: 5px;
      padding: 5px 8px;
      max-width: 100%;
      word-break: break-all;
      margin-top: 2px;
    }

    .img-preview {
      position: relative;
      width: 100%;
    }

    .img-preview img {
      width: 100%;
      max-height: 130px;
      object-fit: contain;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: var(--ink);
      padding: 4px;
      display: block;
    }

    .img-remove {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--rose);
      border: none;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform .15s;
    }

    .img-remove:hover {
      transform: scale(1.1);
    }

    .btn-run {
      width: 100%;
      min-height: 40px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #c9a84c, #a88630);
      color: #0c0e14;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .02em;
      cursor: pointer;
      transition: opacity .2s, transform .12s, box-shadow .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      box-shadow: 0 6px 20px rgba(201, 168, 76, .2);
    }

    .btn-run:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(201, 168, 76, .3);
    }

    .btn-run:disabled {
      opacity: .42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-clear {
      width: 100%;
      min-height: 36px;
      border-radius: 8px;
      border: 1px solid var(--line2);
      background: transparent;
      color: var(--fog);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: border-color .2s, color .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-clear:hover:not(:disabled) {
      border-color: var(--rose);
      color: var(--rose);
    }

    .btn-clear:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn-dl {
      width: 100%;
      min-height: 40px;
      border-radius: 8px;
      border: 1px solid rgba(62, 207, 178, .3);
      background: rgba(62, 207, 178, .07);
      color: var(--teal);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .02em;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
    }

    .btn-dl:hover:not(:disabled) {
      background: rgba(62, 207, 178, .14);
      border-color: rgba(62, 207, 178, .5);
      transform: translateY(-1px);
    }

    .btn-dl:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none;
    }

    .steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      position: relative;
    }

    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 9px;
      top: 26px;
      bottom: -4px;
      width: 1px;
      background: var(--line);
    }

    .step-node {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--line2);
      background: var(--ink3);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .25s;
      position: relative;
      z-index: 1;
    }

    .step.active .step-node {
      border-color: var(--gold);
      background: rgba(201, 168, 76, .1);
      box-shadow: 0 0 12px rgba(201, 168, 76, .4);
    }

    .step.done .step-node {
      border-color: var(--teal);
      background: rgba(62, 207, 178, .1);
    }

    .step-num {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--mist);
      transition: color .25s;
    }

    .step.active .step-num {
      color: var(--gold);
      animation: blink 1.2s ease-in-out infinite;
    }

    .step.done .step-num {
      color: var(--teal);
    }

    .step-label {
      font-size: 12px;
      color: var(--mist);
      transition: color .25s;
    }

    .step.active .step-label {
      color: var(--pale);
    }

    .step.done .step-label {
      color: var(--fog);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .sum-card {
      background: var(--ink4);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      transition: border-color .2s;
    }

    .sum-card:hover {
      border-color: var(--line2);
    }

    .sum-n {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 600;
      color: var(--gold2);
      line-height: 1;
      letter-spacing: -.02em;
    }

    .sum-lbl {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--mist);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 4px;
    }

    .ready-note {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 7px;
      background: rgba(62, 207, 178, .07);
      border: 1px solid rgba(62, 207, 178, .2);
      font-size: 11px;
      color: var(--teal);
      line-height: 1.55;
    }

    .helper-note {
      margin-top: 10px;
      font-size: 10.5px;
      color: var(--mist);
      line-height: 1.6;
    }

    .error-box {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 7px;
      background: var(--rose-dim);
      border: 1px solid rgba(224, 92, 106, .25);
      font-size: 11px;
      color: #f9a8b0;
      line-height: 1.55;
    }

    .right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--ink);
      min-height: 0;
    }

    .viewer-head {
      display: flex;
      align-items: center;
      padding: 0 26px;
      min-height: 60px;
      border-bottom: 1px solid var(--line);
      background: rgba(13, 15, 21, .92);
      gap: 14px;
      flex-shrink: 0;
    }

    .viewer-title-wrap {
      flex: 1;
      min-width: 0;
    }

    .viewer-title {
      font-family: var(--serif);
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -.02em;
    }

    .viewer-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--mist);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-dl-top {
      min-width: 160px;
      min-height: 36px;
      border-radius: 7px;
      border: 1px solid rgba(62, 207, 178, .3);
      background: rgba(62, 207, 178, .06);
      color: var(--teal);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .01em;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-dl-top:hover:not(:disabled) {
      background: rgba(62, 207, 178, .13);
      border-color: rgba(62, 207, 178, .5);
    }

    .btn-dl-top:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    .tab-bar {
      display: flex;
      padding: 0 26px;
      border-bottom: 1px solid var(--line);
      background: rgba(13, 15, 21, .88);
      flex-shrink: 0;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab {
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--mist);
      background: transparent;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color .15s, border-color .15s;
      display: flex;
      align-items: center;
      gap: 7px;
      position: relative;
      bottom: -1px;
      letter-spacing: .02em;
    }

    .tab:hover {
      color: var(--fog);
    }

    .tab.active {
      color: var(--gold2);
      border-bottom-color: var(--gold);
    }

    .tab-cnt {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--ink4);
      border: 1px solid var(--line);
      color: var(--mist);
      font-family: var(--mono);
    }

    .tab.active .tab-cnt {
      background: rgba(201, 168, 76, .12);
      border-color: rgba(201, 168, 76, .28);
      color: var(--gold);
    }

    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--line2) transparent;
    }

    .empty {
      height: 100%;
      min-height: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 60px 20px;
    }

    .empty-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      background: var(--ink3);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-label {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 300;
      color: var(--fog);
      letter-spacing: -.01em;
    }

    .empty-desc {
      font-size: 12px;
      color: var(--mist);
      max-width: 380px;
      line-height: 1.7;
    }

    .empty-arrow {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--line2);
    }

    .raw-pre {
      font-family: var(--mono);
      font-size: 11px;
      color: #9dd4f5;
      background: rgba(7, 9, 14, .9);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
    }

    .empty-tab {
      text-align: center;
      padding: 40px;
      color: var(--mist);
      font-size: 12px;
      font-family: var(--mono);
      border: 1px dashed var(--line);
      border-radius: 10px;
    }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .84rem;
      color: #dbeafe;
      margin-top: 12px;
    }

    .preview-table th {
      background: rgba(201, 168, 76, .08);
      color: var(--gold);
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .04em;
    }

    .preview-table td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(148, 163, 184, .08);
      vertical-align: top;
      font-size: 12px;
    }

    .spin {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(12, 14, 20, .3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: rotate .7s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }

    @keyframes rotate {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {

    /* =========================================================

    :root {

    :root {

      --preview-panel-2: #222a39;
      --preview-text: #eef2ff;
      --preview-muted: #aab4c8;
      --preview-heading: #ffffff;
      --preview-link: #8fc7ff;
      --preview-code-bg: #0b1019;
      --preview-code-text: #bfe3ff;
      --preview-border: #313b50;
      --preview-row-alt: rgba(255, 255, 255, .025);
      --preview-row-hover: rgba(212, 173, 69, .08);
      --preview-positive: #6ee7c5;
      --preview-negative: #ff9cab;
      --preview-warning: #f2cc72;
    }

    .shell[data-mode="light"] {
      --preview-bg: #f4f6fb;
      --preview-panel: #ffffff;
      --preview-panel-2: #f7f9fc;
      --preview-text: #1d2939;
      --preview-muted: #536176;
      --preview-heading: #0b1220;
      --preview-link: #145ea8;
      --preview-code-bg: #eef3f8;
      --preview-code-text: #174f78;
      --preview-border: #d8e0eb;
      --preview-row-alt: #f8fafc;
      --preview-row-hover: rgba(154, 109, 8, .07);
      --preview-positive: #0f766e;
      --preview-negative: #b4233b;
      --preview-warning: #8a5d00;
    }

    .preview-surface {
      color: var(--preview-text);
      background: transparent;
      min-width: 0;
    }

    .preview-surface,
    .preview-surface p,
    .preview-surface li,
    .preview-surface dd,
    .preview-surface dt,
    .preview-surface span,
    .preview-surface div {
      color: var(--preview-text);
    }

    .preview-surface h1,
    .preview-surface h2,
    .preview-surface h3,
    .preview-surface h4,
    .preview-surface h5,
    .preview-surface h6,
    .preview-surface strong,
    .preview-surface b {
      color: var(--preview-heading);
    }

    .preview-surface small,
    .preview-surface .muted,
    .preview-surface .text-muted,
    .preview-surface [class*="muted"],
    .preview-surface [class*="secondary"],
    .preview-surface [class*="subtitle"],
    .preview-surface [class*="description"] {
      color: var(--preview-muted) !important;
    }

    .preview-surface a {
      color: var(--preview-link) !important;
      text-decoration-color: color-mix(in srgb, var(--preview-link) 45%, transparent);
    }

    .preview-surface code,
    .preview-surface pre,
    .preview-surface kbd,
    .preview-surface samp,
    .raw-pre {
      background: var(--preview-code-bg) !important;
      color: var(--preview-code-text) !important;
      border-color: var(--preview-border) !important;
    }

    .preview-surface code {
      padding: 2px 5px;
      border: 1px solid var(--preview-border);
      border-radius: 5px;
      font-family: var(--mono);
      overflow-wrap: anywhere;
    }

    .preview-surface pre code {
      padding: 0;
      border: 0;
      background: transparent !important;
    }

    .preview-surface table,
    .preview-surface .preview-table {
      color: var(--preview-text) !important;
      background: var(--preview-panel) !important;
      border-color: var(--preview-border) !important;
    }

    .preview-surface thead,
    .preview-surface th {
      color: var(--preview-heading) !important;
      background: var(--accent-soft) !important;
      border-color: var(--preview-border) !important;
    }

    .preview-surface tbody,
    .preview-surface td,
    .preview-surface tr {
      color: var(--preview-text) !important;
      border-color: var(--preview-border) !important;
    }

    .preview-surface tbody tr:nth-child(even) {
      background: var(--preview-row-alt) !important;
    }

    .preview-surface tbody tr:hover {
      background: var(--preview-row-hover) !important;
    }

    .preview-surface .preview-card,
    .preview-surface .card,
    .preview-surface [class*="panel"],
    .preview-surface [class*="section"],
    .preview-surface [class*="record"],
    .preview-surface [class*="item"] {
      background-color: var(--preview-panel) !important;
      border-color: var(--preview-border) !important;
      color: var(--preview-text) !important;
    }

    .preview-surface blockquote {
      color: var(--preview-muted) !important;
      background: var(--preview-panel-2) !important;
      border-left: 3px solid var(--accent) !important;
      padding: 10px 12px;
      border-radius: 0 7px 7px 0;
    }

    .preview-surface hr {
      border: 0;
      border-top: 1px solid var(--preview-border);
    }

    .shell[data-mode="light"] .preview-surface [style*="color: white"],
    .shell[data-mode="light"] .preview-surface [style*="color:white"],
    .shell[data-mode="light"] .preview-surface [style*="color: #fff"],
    .shell[data-mode="light"] .preview-surface [style*="color:#fff"],
    .shell[data-mode="light"] .preview-surface [style*="color: #ffffff"],
    .shell[data-mode="light"] .preview-surface [style*="color:#ffffff"],
    .shell[data-mode="light"] .preview-surface [style*="color: rgb(255"],
    .shell[data-mode="light"] .preview-surface [style*="color: #e"],
    .shell[data-mode="light"] .preview-surface [style*="color:#e"],
    .shell[data-mode="light"] .preview-surface [style*="color: #d"],
    .shell[data-mode="light"] .preview-surface [style*="color:#d"] {
      color: var(--preview-text) !important;
    }

    .shell[data-mode="light"] .preview-surface [style*="background: #0"],
    .shell[data-mode="light"] .preview-surface [style*="background:#0"],
    .shell[data-mode="light"] .preview-surface [style*="background-color: #0"],
    .shell[data-mode="light"] .preview-surface [style*="background-color:#0"],
    .shell[data-mode="light"] .preview-surface [style*="background: rgb(0"],
    .shell[data-mode="light"] .preview-surface [style*="background-color: rgb(0"] {
      background: var(--preview-panel) !important;
    }

    .preview-surface .color-code,
    .preview-surface .hex-code,
    .preview-surface [class*="color-code"],
    .preview-surface [class*="hex-code"] {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 7px;
      border: 1px solid var(--preview-border);
      border-radius: 6px;
      background: var(--preview-code-bg) !important;
      color: var(--preview-code-text) !important;
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1.3;
    }

    .preview-surface input[type="color"] {
      width: 34px;
      height: 26px;
      padding: 2px;
      border: 1px solid var(--preview-border);
      border-radius: 6px;
      background: var(--preview-panel);
    }

    .mode-toggle {
      background-color: var(--ink2);
      color: var(--pale);
    }

    .shell[data-mode="light"] .mode-toggle:hover {
      color: #4e3500;
      background: #fff1c7;
    }

    .shell[data-mode="light"] .status-pill.uploaded {
      color: #7a5500;
      background: #fff8df;
      border-color: #e8cc7a;
    }

    .shell[data-mode="light"] .status-pill.processing {
      color: #9a4d00;
      background: #fff2e2;
      border-color: #efb77c;
    }

    .shell[data-mode="light"] .status-pill.success {
      color: #11633a;
      background: #eaf8ef;
      border-color: #9bd6ae;
    }

    .shell[data-mode="light"] .preview-surface svg text {
      fill: #1d2939 !important;
    }

    .shell[data-mode="light"] .preview-surface .plotly text {
      fill: #1d2939 !important;
    }

    .shell[data-mode="light"] .preview-surface .plotly .bg,
    .shell[data-mode="light"] .preview-surface .plotly .plotly {
      fill: #ffffff !important;
    }
